name: ShellCheck

on:
  pull_request:
    paths:
      - '**/*.sh'
      - '.github/workflows/shellcheck.yml'
  push:
    branches:
      - master
      - main
    paths:
      - '**/*.sh'
      - '.github/workflows/shellcheck.yml'

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Show all ShellCheck findings
        run: |
          git ls-files '*.sh' -z | xargs -0 -r shellcheck || true

      - name: Fail only on ShellCheck errors
        run: |
          git ls-files '*.sh' -z | xargs -0 -r shellcheck --severity=error